<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Hellish Golf</title>
    <meta
      name="description"
      content="Hellish Golf is a daily vertical golf challenge for Reddit."
    />
    <meta property="og:title" content="Hellish Golf" />
    <meta
      property="og:description"
      content="Climb today's course, collect coins, and finish in the fewest strokes."
    />
    <meta property="og:image" content="game/logo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="game/logo.jpg" />
    <link rel="icon" type="image/jpeg" href="game/logo.jpg" />
    <link rel="apple-touch-icon" href="game/logo.jpg" />
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        color: #fff;
        background: #180704;
        font-family: system-ui, sans-serif;
      }

      .game-preview {
        position: fixed;
        inset: 0;
        isolation: isolate;
        overflow: hidden;
        background: #180704;
      }

      #preview-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }

      .preview-shade {
        position: absolute;
        inset: 0;
        z-index: 1;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.32), transparent 25%),
          linear-gradient(to top, rgba(0, 0, 0, 0.58), transparent 42%),
          radial-gradient(
            circle at 50% 48%,
            transparent 42%,
            rgba(0, 0, 0, 0.24)
          );
        pointer-events: none;
      }

      .preview-topbar {
        position: absolute;
        top: 12px;
        right: 12px;
        left: 12px;
        z-index: 2;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
      }

      .preview-brand {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
        padding: 6px 10px 6px 6px;
        background: rgba(18, 18, 18, 0.8);
        border: 1px solid rgba(255, 128, 46, 0.42);
        border-radius: 7px;
        box-shadow: 0 5px 16px rgba(0, 0, 0, 0.35);
      }

      .preview-brand img {
        width: 42px;
        height: 42px;
        flex: 0 0 42px;
        object-fit: cover;
        border-radius: 5px;
      }

      .preview-brand-text {
        min-width: 0;
      }

      .preview-brand strong,
      .preview-brand span {
        display: block;
        white-space: nowrap;
      }

      .preview-brand strong {
        font-size: 16px;
        line-height: 1.05;
      }

      .preview-brand span {
        margin-top: 3px;
        color: #e4b176;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .preview-hud {
        display: flex;
        gap: 6px;
      }

      .preview-pill {
        min-width: 67px;
        padding: 7px 9px;
        color: #eee8df;
        background: rgba(18, 18, 18, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 7px;
        box-shadow: 0 5px 16px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      .preview-pill span,
      .preview-pill strong {
        display: block;
      }

      .preview-pill span {
        color: #a9a29a;
        font-size: 8px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .preview-pill strong {
        margin-top: 2px;
        font-size: 14px;
      }

      .preview-launch {
        position: absolute;
        right: 16px;
        bottom: 16px;
        z-index: 3;
        display: inline-flex;
        min-height: 52px;
        align-items: center;
        gap: 10px;
        padding: 0 22px;
        color: #fff8ec;
        background: #a43616;
        border: 2px solid #f3782d;
        border-radius: 7px;
        box-shadow:
          0 5px 0 #591708,
          0 10px 24px rgba(0, 0, 0, 0.42);
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0;
        cursor: pointer;
      }

      .preview-launch svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      .preview-launch:hover,
      .preview-launch:focus-visible {
        background: #c24920;
        outline: 3px solid rgba(255, 235, 197, 0.88);
        outline-offset: 3px;
      }

      .preview-launch:active {
        transform: translateY(3px);
        box-shadow:
          0 2px 0 #591708,
          0 6px 16px rgba(0, 0, 0, 0.42);
      }

      .preview-tip {
        position: absolute;
        bottom: 20px;
        left: 18px;
        z-index: 2;
        max-width: calc(100% - 235px);
        color: rgba(255, 244, 228, 0.8);
        font-size: 11px;
        font-weight: 750;
        text-shadow: 0 2px 6px #000;
        pointer-events: none;
      }

      @media (max-width: 560px) {
        .preview-topbar {
          top: 8px;
          right: 8px;
          left: 8px;
        }

        .preview-brand {
          padding: 5px 7px 5px 5px;
        }

        .preview-brand img {
          width: 36px;
          height: 36px;
          flex-basis: 36px;
        }

        .preview-brand strong {
          font-size: 13px;
        }

        .preview-hud .preview-pill:nth-child(2) {
          display: none;
        }

        .preview-pill {
          min-width: 58px;
          padding: 6px 7px;
        }

        .preview-launch {
          right: 10px;
          bottom: 10px;
          min-height: 48px;
          padding: 0 17px;
          font-size: 13px;
        }

        .preview-tip {
          bottom: 68px;
          left: 12px;
          max-width: calc(100% - 24px);
          font-size: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="game-preview" id="game-preview">
      <canvas id="preview-canvas" aria-hidden="true"></canvas>
      <div class="preview-shade"></div>

      <div class="preview-topbar">
        <div class="preview-brand">
          <img src="game/logo.jpg" alt="" />
          <div class="preview-brand-text">
            <strong>Hellish Golf</strong>
            <span id="preview-day">Loading daily hole</span>
          </div>
        </div>
        <div class="preview-hud">
          <div class="preview-pill">
            <span>Hole</span>
            <strong id="preview-hole">--</strong>
          </div>
          <div class="preview-pill">
            <span>Best</span>
            <strong id="preview-best">-</strong>
          </div>
          <div class="preview-pill">
            <span>Strokes</span>
            <strong>0</strong>
          </div>
        </div>
      </div>

      <div class="preview-tip">
        Drag opposite your target. Release to launch.
      </div>
      <button class="preview-launch" id="play" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 5v14l11-7z" />
        </svg>
        Play today's hole
      </button>
    </main>
    <script type="module" src="./splash.ts"></script>
  </body>
</html>
